
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gideon</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            color: #333;
        }
        #gideon-face {
            height: 25vh;
            background-image: url('gideon-face.jpg');
            background-size: cover;
            background-position: center;
        }
        #chat-container {
            height: 75vh;
            overflow-y: auto;
            padding: 20px;
        }
        .chat-entry {
            margin-bottom: 15px;
        }
        .gideon {
            color: #007acc;
        }
        .user {
            color: #444;
        }
        #voice-button {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 20px;
            background-color: #007acc;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="gideon-face"></div>
    <div id="chat-container"></div>
    <button id="voice-button">Spreek met Gideon</button>

    <script>
        const chatContainer = document.getElementById("chat-container");
        const voiceButton = document.getElementById("voice-button");

        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = "nl-NL";
        recognition.continuous = false;
        recognition.interimResults = false;

        voiceButton.onclick = () => {
            recognition.start();
        };

        recognition.onresult = function(event) {
            const transcript = event.results[0][0].transcript;
            addEntry("user", transcript);
            respondToUser(transcript);
        };

        function addEntry(sender, text) {
            const entry = document.createElement("div");
            entry.className = "chat-entry " + sender;
            entry.textContent = sender === "gideon" ? "Gideon: " + text : "Jij: " + text;
            chatContainer.appendChild(entry);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function respondToUser(input) {
            let response = "Ik begrijp je nog niet helemaal.";
            if (input.toLowerCase().includes("hallo")) {
                response = "Hallo! Hoe kan ik je vandaag helpen?";
            } else if (input.toLowerCase().includes("hoe gaat het")) {
                response = "Met mij gaat het altijd goed. En met jou?";
            }
            addEntry("gideon", response);
            const synth = window.speechSynthesis;
            const utter = new SpeechSynthesisUtterance(response);
            utter.lang = "nl-NL";
            synth.speak(utter);
        }
    </script>
</body>
</html>
